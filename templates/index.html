<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>교통 CCTV 뷰어 — 대구 달서구</title>
  <!-- HLS.js: m3u8 스트림 재생 -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ── 헤더 ── */
    header {
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    header .badge {
      font-size: 0.72rem;
      background: #3b4eca;
      padding: 2px 8px;
      border-radius: 999px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #6b7280;
      margin-left: auto;
    }
    .status-dot.live { background: #22c55e; animation: pulse 1.5s infinite; }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.4; }
    }

    /* ── 레이아웃 ── */
    .container { display: flex; height: calc(100vh - 53px); }

    /* ── 사이드바 (CCTV 목록) ── */
    .sidebar {
      width: 280px;
      min-width: 220px;
      background: #1a1d27;
      border-right: 1px solid #2d3148;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 14px 16px 10px;
      font-size: 0.78rem;
      color: #94a3b8;
      border-bottom: 1px solid #2d3148;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #refresh-btn {
      background: #2d3148;
      border: none;
      color: #94a3b8;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.75rem;
      transition: background 0.2s;
    }
    #refresh-btn:hover { background: #3b4eca; color: #fff; }
    #refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .cctv-list {
      overflow-y: auto;
      flex: 1;
    }
    .cctv-item {
      padding: 12px 16px;
      border-bottom: 1px solid #1e2133;
      cursor: pointer;
      transition: background 0.15s;
    }
    .cctv-item:hover { background: #21263a; }
    .cctv-item.active { background: #1e2f5e; border-left: 3px solid #3b4eca; }
    .cctv-item .name {
      font-size: 0.85rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cctv-item .meta {
      font-size: 0.72rem;
      color: #64748b;
      margin-top: 3px;
    }
    .cctv-item .dist-badge {
      display: inline-block;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 0.68rem;
      color: #94a3b8;
    }

    /* ── 메인 영역 ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* 플레이어 */
    .player-wrap {
      flex: 1;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    #video-player {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
    }
    .placeholder {
      text-align: center;
      color: #374151;
    }
    .placeholder .icon { font-size: 3.5rem; margin-bottom: 12px; }
    .placeholder p { font-size: 0.9rem; }

    /* 하단 정보바 */
    .info-bar {
      background: #1a1d27;
      border-top: 1px solid #2d3148;
      padding: 10px 20px;
      display: flex;
      gap: 24px;
      align-items: center;
      font-size: 0.78rem;
      color: #64748b;
    }
    .info-bar span { color: #94a3b8; }
    #stream-url-display {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: monospace;
      font-size: 0.72rem;
      color: #475569;
    }

    /* 로딩 / 에러 오버레이 */
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: rgba(0,0,0,0.75);
      font-size: 0.9rem;
    }
    .overlay.hidden { display: none; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #334155;
      border-top-color: #3b4eca;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err-msg { color: #f87171; font-size: 0.82rem; text-align: center; padding: 0 24px; }

    /* 스크롤바 */
    .cctv-list::-webkit-scrollbar { width: 4px; }
    .cctv-list::-webkit-scrollbar-track { background: transparent; }
    .cctv-list::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 4px; }

    /* ── 모바일 반응형 (600px 이하) ── */
    @media (max-width: 600px) {
      header { padding: 10px 14px; }
      header h1 { font-size: 0.95rem; }

      /* 세로 레이아웃: 영상 위 / 목록 아래 */
      .container {
        flex-direction: column;
        height: auto;
        min-height: calc(100vh - 45px);
      }

      /* 사이드바 → 하단 목록 */
      .sidebar {
        width: 100%;
        min-width: unset;
        border-right: none;
        border-top: 1px solid #2d3148;
        max-height: 40vh;
        order: 2;
      }

      /* 영상 플레이어 → 상단 고정 */
      .main {
        order: 1;
        flex: none;
      }
      .player-wrap {
        height: 56vw;   /* 16:9 비율 */
        min-height: 180px;
      }

      /* 하단 정보바 간소화 */
      .info-bar {
        padding: 6px 12px;
        gap: 10px;
        flex-wrap: wrap;
      }
      #stream-url-display { display: none; }  /* 모바일엔 URL 숨김 */

      /* 목록 아이템 터치 영역 확대 */
      .cctv-item { padding: 14px 16px; }
      .cctv-item .name { font-size: 0.9rem; white-space: normal; }
    }
  </style>
</head>
<body>

<header>
  <span style="font-size:1.3rem">📹</span>
  <h1>교통 CCTV 뷰어</h1>
  <span class="badge">대구 달서구</span>
  <div class="status-dot" id="status-dot"></div>
</header>

<div class="container">
  <!-- 사이드바 -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <span id="list-count">불러오는 중…</span>
      <button id="refresh-btn" onclick="loadList()" disabled>↺ 새로고침</button>
    </div>
    <div class="cctv-list" id="cctv-list"></div>
  </aside>

  <!-- 메인 -->
  <main class="main">
    <div class="player-wrap">
      <video id="video-player" controls autoplay muted playsinline></video>

      <div class="placeholder" id="placeholder">
        <div class="icon">🎥</div>
        <p>왼쪽 목록에서 CCTV를 선택하세요</p>
      </div>

      <div class="overlay hidden" id="loading-overlay">
        <div class="spinner"></div>
        <span>스트림 연결 중…</span>
      </div>

      <div class="overlay hidden" id="error-overlay">
        <span style="font-size:2rem">⚠️</span>
        <p class="err-msg" id="error-msg"></p>
        <button onclick="hideError()"
          style="margin-top:8px;padding:6px 16px;background:#2d3148;border:none;color:#e2e8f0;border-radius:6px;cursor:pointer">
          닫기
        </button>
      </div>
    </div>

    <div class="info-bar">
      <div>📍 <span id="info-name">—</span></div>
      <div>📏 <span id="info-dist">—</span></div>
      <div id="stream-url-display">스트림 URL 없음</div>
    </div>
  </main>
</div>

<script>
  let hls = null;
  let activeItem = null;

  // ── CCTV 목록 로드 ───────────────────────────────────────────────────────
  async function loadList() {
    const btn = document.getElementById('refresh-btn');
    const countEl = document.getElementById('list-count');
    const listEl = document.getElementById('cctv-list');
    const dot = document.getElementById('status-dot');

    btn.disabled = true;
    countEl.textContent = '불러오는 중…';
    listEl.innerHTML = '<div style="padding:20px;color:#475569;text-align:center;font-size:0.82rem">로딩 중…</div>';
    dot.className = 'status-dot';

    try {
      const res = await fetch('/api/cctv-list');
      const json = await res.json();

      if (!json.ok) throw new Error(json.error || '알 수 없는 오류');

      const list = json.data;
      countEl.textContent = `${list.length}개 카메라`;
      dot.className = 'status-dot live';

      if (list.length === 0) {
        listEl.innerHTML = '<div style="padding:20px;color:#475569;text-align:center;font-size:0.82rem">반경 내 CCTV 없음</div>';
      } else {
        listEl.innerHTML = list.map((c, i) => `
          <div class="cctv-item" data-i="${i}" onclick="selectCctv(${i})"
               data-url="${c.stream_url}" data-name="${escHtml(c.name)}" data-dist="${c.distance_km}" data-fmt="${c.cctvformat}">
            <div class="name" title="${escHtml(c.name)}">${escHtml(c.name)}</div>
            <div class="meta">
              <span class="dist-badge">📍 ${c.distance_km} km</span>
              ${c.road_name ? `<span style="margin-left:6px">${escHtml(c.road_name)}</span>` : ''}
            </div>
          </div>
        `).join('');
      }
    } catch (e) {
      countEl.textContent = '오류';
      listEl.innerHTML = `<div style="padding:16px;color:#f87171;font-size:0.8rem">
        ⚠️ ${escHtml(e.message)}<br><br>
        <span style="color:#64748b">config.py에서 ITS_API_KEY를 확인하세요.</span>
      </div>`;
    } finally {
      btn.disabled = false;
    }
  }

  // ── CCTV 선택 & 재생 ─────────────────────────────────────────────────────
  function selectCctv(i) {
    const items = document.querySelectorAll('.cctv-item');
    items.forEach(el => el.classList.remove('active'));

    const el = document.querySelector(`.cctv-item[data-i="${i}"]`);
    if (!el) return;
    el.classList.add('active');
    activeItem = i;

    const url  = el.dataset.url;
    const name = el.dataset.name;
    const dist = el.dataset.dist;
    const fmt  = el.dataset.fmt || '';

    document.getElementById('info-name').textContent = name;
    document.getElementById('info-dist').textContent = dist + ' km';
    document.getElementById('stream-url-display').textContent = url;

    playStream(url, name, fmt);
  }

  function playStream(url, name, fmt) {
    const video = document.getElementById('video-player');
    const placeholder = document.getElementById('placeholder');
    const loadingOverlay = document.getElementById('loading-overlay');
    const errorOverlay = document.getElementById('error-overlay');

    placeholder.style.display = 'none';
    video.style.display = 'block';
    loadingOverlay.classList.remove('hidden');
    errorOverlay.classList.add('hidden');

    // 기존 HLS 인스턴스 해제
    if (hls) { hls.destroy(); hls = null; }

    // cctvformat 필드 우선, 없으면 URL에서 추측
    const isHls = fmt === 'HLS' || url.includes('.m3u8');

    if (isHls && Hls.isSupported()) {
      hls = new Hls({ enableWorker: false });
      hls.loadSource(url);
      hls.attachMedia(video);

      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        loadingOverlay.classList.add('hidden');
        video.play().catch(() => {});
      });

      hls.on(Hls.Events.ERROR, (_, data) => {
        if (data.fatal) {
          showError(`스트림 오류: ${data.type} — ${data.details}`);
        }
      });

    } else if (video.canPlayType('application/vnd.apple.mpegurl') && isHls) {
      // Safari 네이티브 HLS
      video.src = url;
      video.addEventListener('loadedmetadata', () => {
        loadingOverlay.classList.add('hidden');
        video.play().catch(() => {});
      }, { once: true });

    } else {
      // RTSP 등 직접 재생 불가
      showError('브라우저에서 직접 재생할 수 없는 스트림 형식입니다.\n(RTSP는 VLC 등 별도 플레이어 필요)');
    }
  }

  function showError(msg) {
    document.getElementById('loading-overlay').classList.add('hidden');
    document.getElementById('error-overlay').classList.remove('hidden');
    document.getElementById('error-msg').textContent = msg;
    document.getElementById('status-dot').className = 'status-dot';
  }

  function hideError() {
    document.getElementById('error-overlay').classList.add('hidden');
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── 초기 로드 ────────────────────────────────────────────────────────────
  loadList();
</script>
</body>
</html>
